name: 每日6点自动更新
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python main.py
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add live.m3u
          git commit -m "auto update" || exit 0
          git push
