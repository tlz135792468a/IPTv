name: 每日6点自动更新
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 运行更新脚本
        run: |
          echo "===== 开始运行 main.py ====="
          python main.py
          echo "===== 脚本运行完成 ====="

      - name: 检查 live.m3u 是否生成
        run: |
          if [ -f "live.m3u" ]; then
            echo "✅ live.m3u 已生成"
            ls -lh live.m3u
          else
            echo "❌ 未生成 live.m3u，任务退出"
