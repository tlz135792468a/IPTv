name: Auto Update Migu Live

on:
  schedule:
    - cron: "10 16 * * *"  # UTC 16:10 = 北京时间 00:10，每日自动更新
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate live.m3u and live.txt
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live.m3u live.txt
          # 无变更时跳过提交，避免报错
          git diff --cached --quiet && echo "✅ No changes to commit, skip." || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main
